<svg xmlns="http://www.w3.org/2000/svg" width="940" height="1020" viewBox="0 0 940 1020" font-family="Segoe UI, Helvetica, Arial, sans-serif">
<title>Idempotent inventory reservation - write path</title>
<rect x="0" y="0" width="940" height="1020" fill="#ffffff"/>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,3 L0,6 z" fill="#334155"/>
  </marker>
  <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,3 L0,6 z" fill="#1d4ed8"/>
  </marker>
</defs>
<text x="470.0" y="34" font-size="20" fill="#0f172a" text-anchor="middle" font-weight="bold">Write path: POST /api/v1/inventory/reservations</text>
<text x="470.0" y="56" font-size="12" fill="#64748b" text-anchor="middle" font-weight="normal">Filter chain + transactional service, as wired in the source (X-Idempotency-Key required)</text>
<rect x="190.0" y="84" width="560" height="54" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.6"/>
<text x="470.0" y="108" font-size="14" fill="#0f172a" text-anchor="middle" font-weight="bold">Client</text>
<text x="470.0" y="126" font-size="11" fill="#475569" text-anchor="middle" font-weight="normal">POST body {variantId, warehouseId, quantity, referenceId}  +  X-Idempotency-Key</text>
<line x1="470.0" y1="138" x2="470.0" y2="158" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
<rect x="190.0" y="158" width="560" height="54" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.6"/>
<text x="470.0" y="182" font-size="14" fill="#0f172a" text-anchor="middle" font-weight="bold">MdcRequestFilter   @Order(HIGHEST_PRECEDENCE)</text>
<text x="470.0" y="200" font-size="11" fill="#475569" text-anchor="middle" font-weight="normal">assigns request id -&gt; MDC + X-Request-Id</text>
<line x1="470.0" y1="212" x2="470.0" y2="232" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
<rect x="190.0" y="232" width="560" height="54" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.6"/>
<text x="470.0" y="256" font-size="14" fill="#0f172a" text-anchor="middle" font-weight="bold">SecurityHeadersFilter   @Order(+1)</text>
<text x="470.0" y="274" font-size="11" fill="#475569" text-anchor="middle" font-weight="normal">X-Content-Type-Options, X-Frame-Options, CSP, (HSTS in prod)</text>
<line x1="470.0" y1="286" x2="470.0" y2="306" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
<rect x="190.0" y="306" width="560" height="54" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.6"/>
<text x="470.0" y="330" font-size="14" fill="#0f172a" text-anchor="middle" font-weight="bold">ApiKeyAuthFilter   @Order(+2)</text>
<text x="470.0" y="348" font-size="11" fill="#475569" text-anchor="middle" font-weight="normal">X-Api-Key checked on writes when catalog.security.require-api-key=true</text>
<line x1="470.0" y1="360" x2="470.0" y2="380" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
<rect x="190.0" y="380" width="560" height="54" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.6"/>
<text x="470.0" y="404" font-size="14" fill="#0f172a" text-anchor="middle" font-weight="bold">RateLimitingFilter</text>
<text x="470.0" y="422" font-size="11" fill="#475569" text-anchor="middle" font-weight="normal">token bucket - writes 20/min per IP (Redis; Caffeine fallback if Redis down)</text>
<line x1="470.0" y1="434" x2="470.0" y2="454" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
<rect x="180.0" y="454" width="580" height="78" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2.4"/>
<text x="470.0" y="476" font-size="15" fill="#713f12" text-anchor="middle" font-weight="bold">IdempotencyFilter - ATOMIC CLAIM (the M4 fix)</text>
<text x="470.0" y="496" font-size="12" fill="#854d0e" text-anchor="middle" font-weight="normal">SET idempotency:&lt;method:path:identity:key&gt;  &lt;in-progress&gt;  NX PX 30s</text>
<text x="470.0" y="514" font-size="11" fill="#854d0e" text-anchor="middle" font-weight="normal">claim won -&gt; execute  |  claim lost -&gt; replay 2xx or 409  |  Redis down on /inventory -&gt; 503 (fail-closed)</text>
<line x1="470.0" y1="532" x2="470.0" y2="552" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
<rect x="190.0" y="552" width="560" height="54" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.6"/>
<text x="470.0" y="576" font-size="14" fill="#0f172a" text-anchor="middle" font-weight="bold">InventoryController.reserveStock</text>
<text x="470.0" y="594" font-size="11" fill="#475569" text-anchor="middle" font-weight="normal">maps request -&gt; service call</text>
<line x1="470.0" y1="606" x2="470.0" y2="626" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
<rect x="166.0" y="626" width="608" height="250" rx="12" fill="#f8fafc" stroke="#1e293b" stroke-width="2"/>
<text x="470.0" y="648" font-size="15" fill="#0f172a" text-anchor="middle" font-weight="bold">InventoryService.reserveStock</text>
<text x="470.0" y="666" font-size="11" fill="#475569" text-anchor="middle" font-weight="normal">@Transactional  +  @Retryable(OptimisticLockingFailureException, backoff x1.5)</text>
<rect x="206.0" y="682" width="560" height="26" rx="5" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
<text x="470.0" y="699" font-size="11.5" fill="#0f172a" text-anchor="middle" font-weight="normal">1. load Inventory (variant_id, warehouse_id)</text>
<rect x="206.0" y="712" width="560" height="26" rx="5" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
<text x="470.0" y="729" font-size="11.5" fill="#0f172a" text-anchor="middle" font-weight="normal">2. existing ACTIVE reservation for referenceId?  -&gt;  return it (idempotent)</text>
<rect x="206.0" y="742" width="560" height="26" rx="5" fill="#dbeafe" stroke="#94a3b8" stroke-width="1"/>
<text x="470.0" y="759" font-size="11.5" fill="#0f172a" text-anchor="middle" font-weight="normal">3. inventory.reserve(qty)  -&gt;  save  (@Version optimistic lock)</text>
<rect x="206.0" y="772" width="560" height="26" rx="5" fill="#dbeafe" stroke="#94a3b8" stroke-width="1"/>
<text x="470.0" y="789" font-size="11.5" fill="#0f172a" text-anchor="middle" font-weight="normal">4. save InventoryReservation  (DB unique idx uq_ir_active_inventory_reference)</text>
<rect x="206.0" y="802" width="560" height="26" rx="5" fill="#dbeafe" stroke="#94a3b8" stroke-width="1"/>
<text x="470.0" y="819" font-size="11.5" fill="#0f172a" text-anchor="middle" font-weight="normal">5. append InventoryJournal  (append-only audit; RESERVE)</text>
<rect x="206.0" y="832" width="560" height="26" rx="5" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
<text x="470.0" y="849" font-size="11.5" fill="#0f172a" text-anchor="middle" font-weight="normal">6. publish domain events</text>
<text x="470.0" y="866" font-size="12" fill="#166534" text-anchor="middle" font-weight="bold">COMMIT  (all-or-nothing transaction boundary)</text>
<line x1="470.0" y1="876" x2="470.0" y2="896" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
<rect x="190.0" y="896" width="560" height="54" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.6"/>
<text x="470.0" y="920" font-size="14" fill="#0f172a" text-anchor="middle" font-weight="bold">IdempotencyFilter - record outcome</text>
<text x="470.0" y="938" font-size="11" fill="#475569" text-anchor="middle" font-weight="normal">cache 2xx body 24h; release claim on non-2xx  (retry -&gt; X-Idempotency-Replayed: true)</text>
<line x1="470.0" y1="950" x2="470.0" y2="970" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
<rect x="190.0" y="970" width="560" height="54" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.6"/>
<text x="470.0" y="994" font-size="14" fill="#166534" text-anchor="middle" font-weight="bold">201 Created</text>
<text x="470.0" y="1012" font-size="11" fill="#475569" text-anchor="middle" font-weight="normal">Location: /api/v1/inventory/reservations/{id}</text>
</svg>
