<text x="540.0" y="50" font-size="11.5" fill="#64748b" text-anchor="middle" font-weight="normal">From @Entity classes + Flyway V1..V17.  All catalog tables carry BaseEntity: id(UUID), version, created_at, updated_at, deleted_at (soft delete).</text>
