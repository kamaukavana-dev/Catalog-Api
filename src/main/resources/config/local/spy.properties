# P6Spy configuration for local development
# Activated via application-local.yml
#
# This file configures P6Spy to format and log SQL queries.
# It's a powerful tool for debugging JPA/Hibernate-generated queries.
#
# DO NOT enable this in production. It adds significant overhead.

# Use the Logback/SLF4J logger instead of stdout
appender=com.p6spy.engine.spy.appender.Slf4JLogger
logMessageFormat=com.p6spy.engine.spy.appender.MultiLineFormat

# Custom format to include duration and better readability
customLogMessageFormat=P6SPY | took %(executionTime)ms | %(sqlSingleLine)

# Only log statements that take longer than 1ms
# Set to 0 to log everything
excludecategories=info,debug,result,resultset
executionThreshold=1

