spring:
  threads:
    virtual:
      enabled: true
  application:
    name: catalog-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms
        shutdown-timeout: 100ms

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: CatalogHikariPool
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 60000
      register-mbeans: true

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 25
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
  endpoint:
    health:
      show-details: always
      show-components: always
      status:
        order: DOWN, OUT_OF_SERVICE, DEGRADED, UNKNOWN, UP
        http-mapping:
          DOWN: 503
          OUT_OF_SERVICE: 503
          DEGRADED: 200
          UNKNOWN: 200

  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    group:
      liveness:
        include: livenessState, db
      readiness:
        include: readinessState, db, redis, catalog-storage

  prometheus:
    metrics:
      export:
        enabled: true

  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.1}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

  metrics:
    distribution:
      percentiles-histogram:
        catalog.search.latency: true
        catalog.inventory.reservation.latency: true
        http.server.requests: true
      percentiles:
        catalog.search.latency: 0.5,0.95,0.99
        catalog.inventory.reservation.latency: 0.5,0.95,0.99
        http.server.requests: 0.5,0.95,0.99
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:prod}

catalog:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  inventory:
    # Optimistic lock retry tuning for hot SKU / admin adjustment contention.
    # Default values are applied when not overridden by environment variables.
    retry-max-attempts: ${CATALOG_INVENTORY_RETRY_MAX_ATTEMPTS:10}
    retry-initial-delay-ms: ${CATALOG_INVENTORY_RETRY_INITIAL_DELAY_MS:25}
    retry-multiplier: ${CATALOG_INVENTORY_RETRY_MULTIPLIER:1.5}
  storage:
    bucket: ${S3_BUCKET_NAME:}
    endpoint: ${S3_ENDPOINT:}
    region: ${AWS_REGION:us-east-1}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    base-url: ${S3_BASE_URL:}
  security:
    require-api-key: ${CATALOG_REQUIRE_API_KEY:false}
    api-keys: ${CATALOG_API_KEYS:}
  bulk:
    product:
      max-file-size-bytes: ${CATALOG_BULK_PRODUCT_MAX_FILE_SIZE_BYTES:10485760}
    inventory:
      max-file-size-bytes: ${CATALOG_BULK_INVENTORY_MAX_FILE_SIZE_BYTES:10485760}

info:
  app:
    name: ${spring.application.name}
    version: "@project.version@"

server:
  forward-headers-strategy: framework
  shutdown: graceful
  port: ${PORT:8080}
  tomcat:
    max-http-request-header-size: 16KB
    max-swallow-size: 2MB
  compression:
    enabled: true
    mime-types: application/json
    min-response-size: 1024

logging:
  level:
    root: INFO
    com.catalog: ${LOG_LEVEL_CATALOG:INFO}
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
