spring:
  threads:
    virtual:
      enabled: true
  jpa:
    show-sql: false

management:
  server:
    port: 9001   # separate from public web port; not routed by Render -> /actuator/** unreachable from internet
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always

logging:
  level:
    root: INFO
    com.catalog: INFO

server:
  forward-headers-strategy: framework
  error:
    include-message: never

catalog:
  security:
    enable-hsts: true
    require-api-key: ${CATALOG_REQUIRE_API_KEY:true}
    api-keys: ${CATALOG_API_KEYS:}
